<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
</head>

<body class="bg-base-200 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="mb-6 flex items-center justify-between">
            <h1 class="text-2xl font-bold">Checkout</h1>
            <a href="./index.html" class="btn btn-outline btn-sm">Back to Shop</a>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">

            <!-- LEFT -->
            <div class="bg-base-100 rounded-2xl shadow p-5">
                <h2 class="text-xl font-semibold mb-4">Customer Info</h2>

                <div class="space-y-4">
                    <input id="custName" class="input input-bordered w-full" placeholder="Full Name *" />
                    <input id="custPhone" class="input input-bordered w-full" placeholder="Phone Number *" />
                    <textarea id="custAddress" class="textarea textarea-bordered w-full" rows="4"
                        placeholder="Address *"></textarea>
                </div>

                <h3 class="text-lg font-semibold mt-6 mb-3">Shipping Method</h3>

                <div class="space-y-3">
                    <label class="flex items-center justify-between border rounded-2xl p-4 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="shipping" value="80" class="radio radio-sm" checked />
                            <span>Inside Dhaka</span>
                        </div>
                        <span>৳80</span>
                    </label>

                    <label class="flex items-center justify-between border rounded-2xl p-4 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="shipping" value="150" class="radio radio-sm" />
                            <span>Outside Dhaka</span>
                        </div>
                        <span>৳150</span>
                    </label>
                </div>

                <div class="mt-5 text-sm text-base-content/70 leading-relaxed">
                    <div class="font-semibold">Delivery & Return Policy:</div>
                    Dhaka City – <b>80৳</b> | Outside Dhaka – <b>150৳</b><br>
                    Product পছন্দ না হলে return করা যাবে, তবে delivery charge প্রযোজ্য হবে।
                    প্রোডাক্ট কোয়ালিটি সম্পন্ন আশা করি ভালো লাগবে ❤️
                </div>

                <button id="confirmOrderBtn" class="btn btn-primary w-full mt-6">
                    Confirm Order
                </button>

                <p id="orderStatus" class="mt-3 text-sm"></p>
            </div>

            <!-- RIGHT -->
            <div class="bg-base-100 rounded-2xl shadow p-5">
                <h2 class="text-xl font-semibold mb-4">Order Summary</h2>

                <div id="checkoutItemsWrap" class="space-y-3"></div>

                <div class="border-t mt-5 pt-4 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-base-content/70">Subtotal</span>
                        <span id="subtotalPrice">৳0</span>
                    </div>

                    <div class="flex justify-between text-sm">
                        <span class="text-base-content/70">Shipping</span>
                        <span id="shippingPrice">৳0</span>
                    </div>

                    <div class="flex justify-between text-lg font-bold border-t pt-3">
                        <span>Total</span>
                        <span id="checkoutTotal">৳0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
